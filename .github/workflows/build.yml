name: 打包 Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install pyinstaller Pillow numpy

      - name: 打包成 EXE
        run: |
          pyinstaller --onefile `
            --add-data "header_tongfangtaider.jpg;." `
            --add-data "bar_tongfangtaider.jpg;." `
            --name "watermark_replacer" `
            watermark_replacer.py

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: watermark_replacer_exe
          path: dist/watermark_replacer.exe
